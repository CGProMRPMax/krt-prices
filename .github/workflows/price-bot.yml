name: Rubber Price Bot

on:
  schedule:
    - cron: '30 1 * * 1-6'
  workflow_dispatch:

jobs:
  fetch-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install packages
        run: pip install requests beautifulsoup4 lxml

      - name: Run bot
        run: python scraper/fetch_prices.py

      - name: Save prices
        run: |
          git config --global user.name "KRT Price Bot"
          git config --global user.email "bot@kulathinal.com"
          git add prices/prices.json
          git diff --staged --quiet || git commit -m "Auto-update prices $(date +'%d %b %Y')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
