name: Fetch Rubber Prices Daily

# Why 17:00 IST? Rubber Board publishes the daily Kottayam prices at 4 PM IST.
# Running at 10 AM (the old schedule) always picked up yesterday's data.
# Why minute :37? GitHub Actions queue is busiest on the hour / half-hour.
# Off-peak minutes have better on-time delivery.
on:
  schedule:
    - cron: '37 11 * * *'   # 11:37 UTC = 17:07 IST, daily
  workflow_dispatch:        # manual run from Actions tab

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install playwright beautifulsoup4

      - name: Install Chromium for Playwright
        run: playwright install --with-deps chromium

      - name: Scrape Rubber Board (Playwright)
        run: python fetch_prices.py

      - name: Upload diagnostic dump on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: rubber-scrape-failure-${{ github.run_id }}
          path: debug/
          retention-days: 7
          if-no-files-found: ignore

      - name: Commit and push if prices changed
        id: commit
        run: |
          git config user.name  "krt-prices-bot"
          git config user.email "bot@kulathinal.com"
          git add prices/prices.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "Auto-update rubber prices $(TZ='Asia/Kolkata' date +'%d %b %Y %H:%M IST')"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Purge jsDelivr cache so kulathinal.com sees fresh data
        if: steps.commit.outputs.changed == 'true'
        run: |
          curl -fsSL "https://purge.jsdelivr.net/gh/CGProMRPMax/krt-prices@main/prices/prices.json" \
            || echo "Purge failed (non-fatal)"
